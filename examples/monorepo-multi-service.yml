# ─────────────────────────────────────────────────────
# REQUIRED CI/CD VARIABLES:
# CI_REGISTRY_USER       — Auto-set by GitLab
# CI_REGISTRY_PASSWORD   — Auto-set by GitLab
# KUBECONFIG_PRODUCTION  — base64-encoded kubeconfig
#
# HOW IT WORKS:
# - GitLab evaluates `changes:` rules per job
# - If only services/api/ changed, only api jobs run
# - If shared/ changed, ALL service jobs run
# - This saves runner time and avoids unnecessary builds
# ─────────────────────────────────────────────────────
