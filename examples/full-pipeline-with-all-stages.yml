# Example: Full Pipeline — Build, Test, Scan, Deploy
# Combines Templates 01 + 04 + 03 into a single pipeline
# GitLab CI/CD | GitLab 16.x+
# ─────────────────────────────────────────────────────
#
# This example shows a real-world pipeline that:
#   1. Builds a Docker image
#   2. Runs security scans (Trivy + SAST)
#   3. Deploys to staging via Helm
#   4. Runs smoke tests
#   5. Promotes to production (manual gate)
#
# Use this as a starting point for projects that need
# the full build → scan → deploy lifecycle.
# ─────────────────────────────────────────────────────

variables:
  DOCKER_REGISTRY: "registry.gitlab.com"
  IMAGE_NAME: "$CI_REGISTRY_IMAGE"
  TRIVY_VERSION: "0.50.0"
  HELM_VERSION: "3.14.0"
  CHART_PATH: "./charts/app"
  STAGING_NAMESPACE: "staging"
  PRODUCTION_NAMESPACE: "production"

default:
  retry:
    max: 1
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
  timeout: 20 minutes

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

stages:
  - build
  - test
  - security
  - staging
  - verify
  - production
  - rollback

# ══════════════════════════════════════════════════════
# STAGE 1: BUILD
# ══════════════════════════════════════════════════════

build-image:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  variables:
    DOCKER_DRIVER: overlay2
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - |
      docker build \
        --cache-from $IMAGE_NAME:latest \
        --build-arg BUILDKIT_INLINE_CACHE=1 \
        --label "git.commit=$CI_COMMIT_SHA" \
        -t $IMAGE_NAME:$CI_COMMIT_SHA \
        -t $IMAGE_NAME:$CI_COMMIT_REF_SLUG \
        .
    - docker push $IMAGE_NAME:$CI_COMMIT_SHA
    - docker push $IMAGE_NAME:$CI_COMMIT_REF_SLUG
  rules:
    - if: $CI_COMMIT_BRANCH || $CI_MERGE_REQUEST_ID || $CI_COMMIT_TAG

# ══════════════════════════════════════════════════════
# STAGE 2: TEST
# ══════════════════════════════════════════════════════

unit-tests:
  stage: test
  image: $IMAGE_NAME:$CI_COMMIT_SHA
  script:
    # Replace with your actual test commands
    - echo "Running unit tests..."
    # - python -m pytest tests/ -v --cov=app --cov-report=xml
    # - npm test -- --coverage
    # - go test ./... -v -coverprofile=coverage.out
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
  rules:
    - if: $CI_COMMIT_BRANCH || $CI_MERGE_REQUEST_ID

# ══════════════════════════════════════════════════════
# STAGE 3: SECURITY SCANNING
# ══════════════════════════════════════════════════════

trivy-container-scan:
  stage: security
  image:
    name: aquasec/trivy:${TRIVY_VERSION}
    entrypoint: [""]
  script:
    - |
      trivy image \
        --exit-code 0 \
        --format table \
        --severity CRITICAL,HIGH \
        $IMAGE_NAME:$CI_COMMIT_SHA | tee trivy-report.txt
    # Block pipeline on CRITICAL unfixed vulnerabilities
    - |
      trivy image \
        --exit-code 1 \
        --severity CRITICAL \
        --ignore-unfixed \
        $IMAGE_NAME:$CI_COMMIT_SHA
  artifacts:
    when: always
    paths:
      - trivy-report.txt
    expire_in: 30 days
  needs: [build-image]
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

trivy-filesystem-scan:
  stage: security
  image:
    name: aquasec/trivy:${TRIVY_VERSION}
    entrypoint: [""]
  script:
    - trivy fs --exit-code 0 --severity CRITICAL,HIGH --format table .
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

# ══════════════════════════════════════════════════════
# STAGE 4: DEPLOY TO STAGING
# ══════════════════════════════════════════════════════

deploy-staging:
  stage: staging
  image: alpine/helm:${HELM_VERSION}
  before_script:
    - apk add --no-cache curl
    - curl -LO "https://dl.k8s.io/release/v1.29.0/bin/linux/amd64/kubectl"
    - chmod +x kubectl && mv kubectl /usr/local/bin/
    - mkdir -p ~/.kube
    - echo "${KUBECONFIG_STAGING}" | base64 -d > ~/.kube/config
    - chmod 600 ~/.kube/config
  script:
    - |
      helm upgrade --install $CI_PROJECT_NAME-staging ${CHART_PATH} \
        --namespace ${STAGING_NAMESPACE} \
        --create-namespace \
        --set image.repository=$IMAGE_NAME \
        --set image.tag=$CI_COMMIT_SHA \
        --set environment=staging \
        --set replicaCount=1 \
        --values ${CHART_PATH}/values-staging.yaml \
        --wait \
        --timeout 5m
    - kubectl get pods -n ${STAGING_NAMESPACE}
  environment:
    name: staging
    url: https://staging.example.com
  needs: [build-image, trivy-container-scan]
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ══════════════════════════════════════════════════════
# STAGE 5: VERIFY STAGING
# ══════════════════════════════════════════════════════

smoke-test-staging:
  stage: verify
  image: curlimages/curl:latest
  script:
    - sleep 30
    - |
      RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" https://staging.example.com/health)
      if [ "$RESPONSE" != "200" ]; then
        echo "STAGING HEALTH CHECK FAILED — HTTP $RESPONSE"
        exit 1
      fi
      echo "Staging verified — HTTP $RESPONSE"
  needs: [deploy-staging]
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ══════════════════════════════════════════════════════
# STAGE 6: PROMOTE TO PRODUCTION
# ══════════════════════════════════════════════════════

deploy-production:
  stage: production
  image: alpine/helm:${HELM_VERSION}
  before_script:
    - apk add --no-cache curl
    - curl -LO "https://dl.k8s.io/release/v1.29.0/bin/linux/amd64/kubectl"
    - chmod +x kubectl && mv kubectl /usr/local/bin/
    - mkdir -p ~/.kube
    - echo "${KUBECONFIG_PRODUCTION}" | base64 -d > ~/.kube/config
    - chmod 600 ~/.kube/config
  script:
    - echo "PROMOTING $CI_COMMIT_SHA to PRODUCTION"
    - |
      helm upgrade --install $CI_PROJECT_NAME-production ${CHART_PATH} \
        --namespace ${PRODUCTION_NAMESPACE} \
        --create-namespace \
        --set image.repository=$IMAGE_NAME \
        --set image.tag=$CI_COMMIT_SHA \
        --set environment=production \
        --set replicaCount=3 \
        --values ${CHART_PATH}/values-production.yaml \
        --wait \
        --timeout 10m
    - kubectl get pods -n ${PRODUCTION_NAMESPACE}
  environment:
    name: production
    url: https://production.example.com
  needs: [smoke-test-staging]
  when: manual
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual

# ══════════════════════════════════════════════════════
# STAGE 7: ROLLBACK (Emergency)
# ══════════════════════════════════════════════════════

rollback-production:
  stage: rollback
  image: alpine/helm:${HELM_VERSION}
  before_script:
    - mkdir -p ~/.kube
    - echo "${KUBECONFIG_PRODUCTION}" | base64 -d > ~/.kube/config
  script:
    - echo "EMERGENCY ROLLBACK initiated by ${GITLAB_USER_NAME}"
    - helm rollback $CI_PROJECT_NAME-production 0 --namespace ${PRODUCTION_NAMESPACE} --wait
    - helm history $CI_PROJECT_NAME-production --namespace ${PRODUCTION_NAMESPACE} | tail -5
  when: manual
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual

# ─────────────────────────────────────────────────────
# REQUIRED CI/CD VARIABLES:
# CI_REGISTRY_USER        — Auto-set by GitLab
# CI_REGISTRY_PASSWORD    — Auto-set by GitLab
# KUBECONFIG_STAGING      — base64-encoded kubeconfig for staging cluster
# KUBECONFIG_PRODUCTION   — base64-encoded kubeconfig for production cluster
# ─────────────────────────────────────────────────────
