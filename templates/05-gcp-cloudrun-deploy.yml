# Template 05: GCP Cloud Run Deployment Pipeline
# GitLab CI/CD | Production-Grade | GitLab 16.x+
# Features: Build → Push to Artifact Registry → Deploy to Cloud Run
# From: Mohamed AbdelAziz — DevOps Accelerator
# ─────────────────────────────────────────────────────────────────

variables:
  # GCP Project ID
  GCP_PROJECT_ID: "your-gcp-project-id"
  # GCP Region for Cloud Run and Artifact Registry
  GCP_REGION: "me-west1"   # Middle East (Israel) — closest to UAE. Use europe-west1 if preferred.
  # Artifact Registry repository name
  AR_REPOSITORY: "devops-apps"
  # Full image path in Artifact Registry
  IMAGE_PATH: "${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${AR_REPOSITORY}/${CI_PROJECT_NAME}"
  # Cloud Run service name
  CLOUD_RUN_SERVICE: "${CI_PROJECT_NAME}"
  # Cloud Run port (must match your application's listen port)
  CLOUD_RUN_PORT: "8080"
  # Memory allocation for Cloud Run
  CLOUD_RUN_MEMORY: "512Mi"
  # CPU allocation
  CLOUD_RUN_CPU: "1"
  # Minimum instances (0 = scale to zero when idle, costs nothing)
  CLOUD_RUN_MIN_INSTANCES: "0"
  # Maximum instances
  CLOUD_RUN_MAX_INSTANCES: "10"

default:
  retry:
    max: 1
    when:
      - runner_system_failure
  timeout: 20 minutes

workflow:
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

stages:
  - build
  - deploy

# ── BUILD & PUSH TO ARTIFACT REGISTRY ─────────────────────────────
gcp-docker-build:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
    DOCKER_DRIVER: overlay2
  before_script:
    # Authenticate to GCP using service account key
    # GCP_SERVICE_ACCOUNT_KEY is the JSON key file content (base64 encoded in CI variable)
    - echo "${GCP_SERVICE_ACCOUNT_KEY}" | base64 -d > /tmp/gcp-key.json
    - docker login -u _json_key --password-stdin https://${GCP_REGION}-docker.pkg.dev < /tmp/gcp-key.json
  script:
    - |
      docker build \
        --build-arg COMMIT_SHA=$CI_COMMIT_SHA \
        --build-arg BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ') \
        -t ${IMAGE_PATH}:${CI_COMMIT_SHA} \
        -t ${IMAGE_PATH}:latest \
        .
    - docker push ${IMAGE_PATH}:${CI_COMMIT_SHA}
    - docker push ${IMAGE_PATH}:latest
    - echo "Image pushed: ${IMAGE_PATH}:${CI_COMMIT_SHA}"

# ── DEPLOY TO CLOUD RUN ───────────────────────────────────────────
gcp-cloud-run-deploy:
  stage: deploy
  image: google/cloud-sdk:alpine
  before_script:
    # Authenticate to GCP
    - echo "${GCP_SERVICE_ACCOUNT_KEY}" | base64 -d > /tmp/gcp-key.json
    - gcloud auth activate-service-account --key-file=/tmp/gcp-key.json
    - gcloud config set project ${GCP_PROJECT_ID}
    - gcloud config set run/region ${GCP_REGION}
  script:
    - echo "Deploying to Cloud Run: ${CLOUD_RUN_SERVICE}"
    - |
      gcloud run deploy ${CLOUD_RUN_SERVICE} \
        --image ${IMAGE_PATH}:${CI_COMMIT_SHA} \
        --platform managed \
        --region ${GCP_REGION} \
        --port ${CLOUD_RUN_PORT} \
        --memory ${CLOUD_RUN_MEMORY} \
        --cpu ${CLOUD_RUN_CPU} \
        --min-instances ${CLOUD_RUN_MIN_INSTANCES} \
        --max-instances ${CLOUD_RUN_MAX_INSTANCES} \
        --allow-unauthenticated \
        --set-env-vars "ENVIRONMENT=production,VERSION=${CI_COMMIT_SHA}" \
        --quiet
    # Get the deployed service URL
    - |
      SERVICE_URL=$(gcloud run services describe ${CLOUD_RUN_SERVICE} \
        --region ${GCP_REGION} \
        --format 'value(status.url)')
      echo "Service deployed to: ${SERVICE_URL}"
    # Health check
    - |
      sleep 10
      HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${SERVICE_URL}/health" || echo "000")
      echo "Health check status: ${HTTP_STATUS}"
  environment:
    name: production
    url: $SERVICE_URL
  needs: [gcp-docker-build]
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual

# REQUIRED CI/CD VARIABLES:
# GCP_SERVICE_ACCOUNT_KEY — base64-encoded GCP service account JSON key
#   Required IAM roles on the service account:
#   - roles/run.admin          (deploy Cloud Run)
#   - roles/artifactregistry.writer (push images)
#   - roles/iam.serviceAccountUser (act as service account)
#
# Optional — to pass secrets to Cloud Run:
# Use Secret Manager + Cloud Run secret references (more secure than env vars)
# gcloud run deploy ... --update-secrets=SECRET_NAME=secret-name:latest
